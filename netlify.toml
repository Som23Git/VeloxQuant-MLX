[build]
  base    = "/"
  command = """
    cd docs-site && npm install && npm run build && cd .. &&
    mkdir -p dist/docs &&
    cp -r docs-site/build/* dist/docs/ &&
    cp -r landing/* dist/
  """
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "YOUR_APP_ID,YOUR_SEARCH_API_KEY"
