name: copyright-watch

# Searches GitHub's public code index for distinctive strings from this repo
# (class names, package names, unique identifiers). If anyone has copied the
# code into their own repo without attribution, the workflow fails — and
# GitHub emails you on workflow failure (per your notification settings at
# https://github.com/settings/notifications).
#
# Limitations:
#   - Only indexes PUBLIC GitHub repos (no GitLab, Bitbucket, private mirrors).
#   - Search has a few-day indexing lag for new repos.
#   - Forks of THIS repo are excluded automatically by the -repo: filter,
#     so legitimate forks (which preserve the LICENSE) won't trigger alerts.

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: read

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Search for unauthorized copies
        uses: actions/github-script@v7
        with:
          script: |
            // Distinctive identifiers — strongly unique class names only.
            // Excluding our own repo so legitimate forks don't trigger.
            //
            // We deliberately do NOT search for the generic strings
            // "mlx_kv_quant" or "VeloxQuant-MLX" — those have high
            // false-positive rates because they appear in PyPI metadata
            // mirrors (e.g. szabgab/pydigger-data), AI-assistant transcripts,
            // and legitimate downstream users' install scripts. The class
            // names below are unique enough that any hit warrants review.
            const SELF = 'rajveer43/VeloxQuant-MLX';
            const queries = [
              `"TurboQuantRVQMLXKVCache" -repo:${SELF}`,
              `"OutlierTokenRVQMLXKVCache" -repo:${SELF}`,
              `"RateQuantRVQMLXKVCache" -repo:${SELF}`,
              `"TurboQuantMLXKVCache" -repo:${SELF}`,
              `"_rvq_quality_synthetic" -repo:${SELF}`,
              `"allocate_bits_waterfilling" -repo:${SELF}`,
            ];

            let total_hits = 0;
            const findings = [];

            for (const q of queries) {
              try {
                const r = await github.rest.search.code({
                  q,
                  per_page: 10,
                });
                if (r.data.total_count > 0) {
                  total_hits += r.data.total_count;
                  const repos = [...new Set(r.data.items.map(
                    i => i.repository.full_name
                  ))];
                  findings.push({
                    query: q,
                    count: r.data.total_count,
                    repos,
                  });
                  core.warning(
                    `Query "${q}" → ${r.data.total_count} hit(s) in: ${repos.join(', ')}`
                  );
                }
                // GitHub code-search rate limit: 10 req/min
                await new Promise(r => setTimeout(r, 7000));
              } catch (e) {
                core.warning(`Query failed: ${q} — ${e.message}`);
              }
            }

            if (total_hits > 0) {
              const lines = ['# Possible unauthorized copies detected', ''];
              for (const f of findings) {
                lines.push(`## \`${f.query}\``);
                lines.push(`- ${f.count} match(es)`);
                lines.push('- Repos:');
                for (const r of f.repos) {
                  lines.push(`  - https://github.com/${r}`);
                }
                lines.push('');
              }
              await core.summary.addRaw(lines.join('\n')).write();
              core.setFailed(
                `Found ${total_hits} potential copies across ` +
                `${findings.length} watched query/queries. ` +
                `See workflow summary for repo links.`
              );
            } else {
              core.info('No unauthorized copies detected.');
            }
